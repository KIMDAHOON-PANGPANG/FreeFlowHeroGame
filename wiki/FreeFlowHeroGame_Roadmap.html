<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeFlowHeroGame - Sprint Roadmap</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3345;
    --text: #e4e7ef;
    --text2: #9ba3b8;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --green: #22c55e;
    --green-bg: #22c55e18;
    --yellow: #eab308;
    --yellow-bg: #eab30818;
    --orange: #f97316;
    --orange-bg: #f9731618;
    --red: #ef4444;
    --red-bg: #ef444418;
    --blue: #3b82f6;
    --blue-bg: #3b82f618;
    --purple: #7c3aed;
    --purple-bg: #7c3aed18;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-sub {
    font-size: 14px;
    color: var(--text2);
    margin-top: 4px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--surface2); border-color: var(--accent); }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn-accent:hover { background: #6d28d9; }

  /* Category Tabs (프로그래밍/아트) */
  .category-tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 16px;
  }
  .category-tab {
    padding: 12px 24px;
    border-radius: 8px 8px 0 0;
    background: transparent;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.2s;
    position: relative;
  }
  .category-tab:hover { color: var(--text); }
  .category-tab.active {
    color: var(--accent);
    background: var(--surface);
  }
  .category-tab.active::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }

  /* Content sections for categories */
  .category-content {
    display: none;
  }
  .category-content.active {
    display: block;
  }

  /* Summary Cards */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .summary-card .num {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .summary-card .label { font-size: 12px; color: var(--text2); }

  /* Phase Tabs */
  .phase-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .phase-tab {
    padding: 8px 16px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .phase-tab:hover { border-color: var(--accent); color: var(--text); }
  .phase-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Timeline */
  .timeline { position: relative; }

  .sprint-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .sprint-block:hover { border-color: var(--accent); }
  .sprint-block.completed { border-left: 3px solid var(--green); }
  .sprint-block.in-progress { border-left: 3px solid var(--yellow); }
  .sprint-block.planned { border-left: 3px solid var(--blue); }
  .sprint-block.vision { border-left: 3px solid var(--purple); }

  .sprint-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }
  .sprint-header:hover { background: var(--surface2); }

  .sprint-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sprint-week {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent2);
    min-width: 80px;
  }
  .sprint-title {
    font-size: 16px;
    font-weight: 600;
  }
  .sprint-phase {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .phase-4 { background: var(--orange-bg); color: var(--orange); }
  .phase-5 { background: var(--blue-bg); color: var(--blue); }
  .phase-6 { background: var(--purple-bg); color: var(--purple); }
  .phase-done { background: var(--green-bg); color: var(--green); }
  .phase-art-a { background: var(--orange-bg); color: var(--orange); }
  .phase-art-b { background: var(--blue-bg); color: var(--blue); }
  .phase-art-c { background: var(--purple-bg); color: var(--purple); }
  .phase-gd-a { background: var(--orange-bg); color: var(--orange); }
  .phase-gd-b { background: var(--blue-bg); color: var(--blue); }
  .phase-gd-c { background: var(--purple-bg); color: var(--purple); }

  .sprint-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sprint-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text2);
  }
  .progress-bar {
    width: 100px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .chevron {
    transition: transform 0.2s;
    color: var(--text2);
  }
  .sprint-block.open .chevron { transform: rotate(180deg); }

  /* Tasks */
  .sprint-body {
    display: none;
    padding: 0 20px 16px;
  }
  .sprint-block.open .sprint-body { display: block; }

  .task-list { list-style: none; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    transition: background 0.15s;
  }
  .task-item:hover { background: var(--surface2); }

  .task-check {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .task-check:hover { border-color: var(--accent); }
  .task-check.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .task-check.checked::after {
    content: '\2713';
    color: white;
    font-size: 12px;
    font-weight: 700;
  }

  .task-content { flex: 1; }
  .task-name {
    font-size: 14px;
    font-weight: 500;
    outline: none;
  }
  .task-name[contenteditable]:focus {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .task-item.done .task-name {
    text-decoration: line-through;
    color: var(--text2);
  }
  .task-desc {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
    outline: none;
  }
  .task-desc[contenteditable]:focus {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* Add task */
  .add-task-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    width: 100%;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .add-task-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* Dependencies / Notes */
  .sprint-notes {
    margin-top: 12px;
    padding: 12px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .sprint-notes-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .sprint-notes-content {
    font-size: 13px;
    color: var(--text2);
    outline: none;
    min-height: 20px;
  }
  .sprint-notes-content[contenteditable]:focus {
    color: var(--text);
  }

  /* Add Sprint */
  .add-sprint-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    border-radius: 16px;
    border: 2px dashed var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    width: 100%;
    margin-top: 16px;
    transition: all 0.15s;
  }
  .add-sprint-btn:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* Modals */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal.active { display: flex; }
  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 500px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  .form-group textarea {
    resize: vertical;
    min-height: 80px;
  }
  .form-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 24px;
  }
  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    background: var(--border);
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>FreeFlowHeroGame</h1>
    <p class="header-sub">프로그래밍 & 아트 & 기획 통합 로드맵</p>
  </div>
  <div class="header-actions">
    <button class="btn" id="exportBtn">JSON 내보내기</button>
    <button class="btn" id="importBtn">JSON 불러오기</button>
  </div>
</div>

<!-- Category Tabs (프로그래밍 / 아트) -->
<div class="category-tabs">
  <button class="category-tab active" data-category="programming">프로그래밍</button>
  <button class="category-tab" data-category="art">아트</button>
  <button class="category-tab" data-category="design">기획</button>
</div>

<!-- PROGRAMMING CATEGORY -->
<div class="category-content active" data-category="programming">
  <div class="summary-row" id="programmingSummary">
    <div class="summary-card">
      <div class="num" id="prog-total">0</div>
      <div class="label">전체 스프린트</div>
    </div>
    <div class="summary-card">
      <div class="num" id="prog-completed">0</div>
      <div class="label">완료</div>
    </div>
    <div class="summary-card">
      <div class="num" id="prog-tasks">0</div>
      <div class="label">전체 작업</div>
    </div>
    <div class="summary-card">
      <div class="num" id="prog-progress">0%</div>
      <div class="label">진행률</div>
    </div>
  </div>

  <div class="phase-tabs" id="progPhaseTabs">
    <button class="phase-tab active" data-phase="all">모두</button>
    <button class="phase-tab" data-phase="done">완료</button>
    <button class="phase-tab" data-phase="4">Phase 4</button>
    <button class="phase-tab" data-phase="5">Phase 5</button>
    <button class="phase-tab" data-phase="6">Phase 6</button>
  </div>

  <div class="timeline" id="programmingTimeline"></div>
  <button class="add-sprint-btn" data-category="programming">+ 새 스프린트 추가</button>
</div>

<!-- ART CATEGORY -->
<div class="category-content" data-category="art">
  <div class="summary-row" id="artSummary">
    <div class="summary-card">
      <div class="num" id="art-total">0</div>
      <div class="label">전체 스프린트</div>
    </div>
    <div class="summary-card">
      <div class="num" id="art-completed">0</div>
      <div class="label">완료</div>
    </div>
    <div class="summary-card">
      <div class="num" id="art-tasks">0</div>
      <div class="label">전체 작업</div>
    </div>
    <div class="summary-card">
      <div class="num" id="art-progress">0%</div>
      <div class="label">진행률</div>
    </div>
  </div>

  <div class="phase-tabs" id="artPhaseTabs">
    <button class="phase-tab active" data-phase="all">모두</button>
    <button class="phase-tab" data-phase="done">완료</button>
    <button class="phase-tab" data-phase="art-a">Phase A</button>
    <button class="phase-tab" data-phase="art-b">Phase B</button>
    <button class="phase-tab" data-phase="art-c">Phase C</button>
  </div>

  <div class="timeline" id="artTimeline"></div>
  <button class="add-sprint-btn" data-category="art">+ 새 스프린트 추가</button>
</div>

<!-- DESIGN CATEGORY -->
<div class="category-content" data-category="design">
  <div class="summary-row" id="designSummary">
    <div class="summary-card">
      <div class="num" id="design-total">0</div>
      <div class="label">전체 스프린트</div>
    </div>
    <div class="summary-card">
      <div class="num" id="design-completed">0</div>
      <div class="label">완료</div>
    </div>
    <div class="summary-card">
      <div class="num" id="design-tasks">0</div>
      <div class="label">전체 작업</div>
    </div>
    <div class="summary-card">
      <div class="num" id="design-progress">0%</div>
      <div class="label">진행률</div>
    </div>
  </div>

  <div class="phase-tabs" id="designPhaseTabs">
    <button class="phase-tab active" data-phase="all">모두</button>
    <button class="phase-tab" data-phase="done">완료</button>
    <button class="phase-tab" data-phase="gd-a">Phase 4기</button>
    <button class="phase-tab" data-phase="gd-b">Phase 5기</button>
    <button class="phase-tab" data-phase="gd-c">Phase 6기</button>
  </div>

  <div class="timeline" id="designTimeline"></div>
  <button class="add-sprint-btn" data-category="design">+ 새 스프린트 추가</button>
</div>

<!-- Add Task Modal -->
<div class="modal" id="addTaskModal">
  <div class="modal-content">
    <div class="modal-title">작업 추가</div>
    <div class="form-group">
      <label>작업 이름</label>
      <input type="text" id="taskNameInput" placeholder="작업 이름을 입력하세요">
    </div>
    <div class="form-group">
      <label>설명 (선택)</label>
      <textarea id="taskDescInput" placeholder="작업 설명"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeAddTaskModal()">취소</button>
      <button class="btn btn-accent" onclick="saveNewTask()">추가</button>
    </div>
  </div>
</div>

<!-- Add Sprint Modal -->
<div class="modal" id="addSprintModal">
  <div class="modal-content">
    <div class="modal-title">스프린트 추가</div>
    <div class="form-group">
      <label>주차 (예: W10)</label>
      <input type="text" id="sprintWeekInput" placeholder="W10">
    </div>
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="sprintTitleInput" placeholder="스프린트 제목">
    </div>
    <div class="form-group">
      <label>페이즈</label>
      <select id="sprintPhaseSelect">
        <option value="4">Phase 4</option>
        <option value="5">Phase 5</option>
        <option value="6">Phase 6</option>
        <option value="art-a">Art Phase A</option>
        <option value="art-b">Art Phase B</option>
        <option value="art-c">Art Phase C</option>
        <option value="gd-a">기획 Phase 4기</option>
        <option value="gd-b">기획 Phase 5기</option>
        <option value="gd-c">기획 Phase 6기</option>
        <option value="done">완료</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeAddSprintModal()">취소</button>
      <button class="btn btn-accent" onclick="saveNewSprint()">추가</button>
    </div>
  </div>
</div>

<input type="file" id="importFileInput" style="display: none;" accept=".json">

<script>
  const STORAGE_KEY = 'freeflow-hero-roadmap';
  let currentAddingSprintCategory = null;
  let currentAddingTaskSprintId = null;

  const initialData = {
    programming: [
      { id: 'prog-p1-w1', week: 'W1-3', title: '플레이어 FSM + Hitbox/Hurtbox', phase: 'done', tasks: [{ id: '1', name: '플레이어 FSM 기초 구현', desc: 'Idle, Strike, Dodge, Guard 상태', done: true }, { id: '2', name: 'Hitbox/Hurtbox 시스템', desc: '원형/박스형 콜라이더, 배치 최적화', done: true }, { id: '3', name: 'CombatEventBus 구현', desc: '이벤트 기반 모듈 통신', done: true }], notes: '기초 전투 시스템 완료' },
      { id: 'prog-p1-w4', week: 'W4-6', title: '콤보 시스템 + 회피(Dodge)', phase: 'done', tasks: [{ id: '1', name: '콤보 윈도우 + 캔슬', desc: '0.8초 콤보 타이밍, 캔슬 윈도우 로직', done: true }, { id: '2', name: '회피 I-frame + 무적프레임', desc: '12프레임 무적, 대시 이동', done: true }, { id: '3', name: '인풋 버퍼 시스템', desc: '0.15초 선입력 유효', done: true }], notes: '프리플로우 코어 메카닉 구현 완료' },

      ], notes: '적 AI 확장 기획 — 프로그래밍 W20과 동기화' },

        { id: '4', name: '차세대 프리플로우 비전 재정리', desc: '프로토 결과 반영하여 기획서 11~12장 업데이트. 실현 가능성 등급 재평가', done: false }
      ], notes: 'Phase 6 마무리 — 기획서 최종 업데이트' }
    ]
  };

  function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(initialData));
    } else {
      // 기존 저장 데이터에 design 카테고리가 없으면 추가
      const data = JSON.parse(saved);
      if (!data.design) {
        data.design = initialData.design;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }
    }
    render();
    attachEventListeners();
  }

  function render() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || initialData;
    if (!data.design) data.design = initialData.design;
    renderCategory('programming', data.programming);
    renderCategory('art', data.art);
    renderCategory('design', data.design);
    updateSummary('programming', data.programming);
    updateSummary('art', data.art);
    updateSummary('design', data.design);
  }

  function renderCategory(category, sprints) {
    const tlMap = { programming: 'programmingTimeline', art: 'artTimeline', design: 'designTimeline' };
    const ptMap = { programming: 'progPhaseTabs', art: 'artPhaseTabs', design: 'designPhaseTabs' };
    const timelineEl = document.getElementById(tlMap[category]);
    timelineEl.innerHTML = '';
    const activePhase = document.querySelector(`#${ptMap[category]} .phase-tab.active`).dataset.phase;

    sprints.forEach(sprint => {
      if (activePhase !== 'all' && sprint.phase !== activePhase) return;
      const phaseClass = `phase-${sprint.phase}`;
      const sprintEl = document.createElement('div');
      sprintEl.className = `sprint-block completed ${sprint.phase === 'done' ? 'open' : ''}`;
      sprintEl.id = sprint.id;
      sprintEl.dataset.phase = sprint.phase;
      sprintEl.dataset.category = category;

      const completed = sprint.tasks.filter(t => t.done).length;
      const total = sprint.tasks.length;
      const progress = total > 0 ? Math.round(completed / total * 100) : 0;

      sprintEl.innerHTML = `
        <div class="sprint-header">
          <div class="sprint-left">
            <span class="sprint-week">${sprint.week}</span>
            <span class="sprint-title">${sprint.title}</span>
            <span class="sprint-phase ${phaseClass}">${getPhaseLabel(sprint.phase)}</span>
          </div>
          <div class="sprint-right">
            <div class="sprint-progress">
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${progress}%; background: ${getProgressColor(progress)}"></div>
              </div>
              <span>${completed}/${total}</span>
            </div>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="sprint-body">
          <ul class="task-list">
            ${sprint.tasks.map(task => `
              <li class="task-item ${task.done ? 'done' : ''}">
                <div class="task-check ${task.done ? 'checked' : ''}" data-task-id="${task.id}" data-sprint-id="${sprint.id}" data-category="${category}"></div>
                <div class="task-content">
                  <div class="task-name" contenteditable="true" data-task-id="${task.id}" data-sprint-id="${sprint.id}" data-category="${category}">${task.name}</div>
                  ${task.desc ? `<div class="task-desc" contenteditable="true" data-task-id="${task.id}" data-sprint-id="${sprint.id}" data-category="${category}">${task.desc}</div>` : ''}
                </div>
              </li>
            `).join('')}
          </ul>
          <button class="add-task-btn" data-sprint-id="${sprint.id}" data-category="${category}">+ 작업 추가</button>
          <div class="sprint-notes">
            <div class="sprint-notes-title">노트</div>
            <div class="sprint-notes-content" contenteditable="true" data-sprint-id="${sprint.id}" data-category="${category}">${sprint.notes}</div>
          </div>
        </div>
      `;
      timelineEl.appendChild(sprintEl);
    });
  }

  function updateSummary(category, sprints) {
    const totalSprints = sprints.length;
    const completedSprints = sprints.filter(s => s.phase === 'done').length;
    const totalTasks = sprints.reduce((sum, s) => sum + s.tasks.length, 0);
    const completedTasks = sprints.reduce((sum, s) => sum + s.tasks.filter(t => t.done).length, 0);
    const progress = totalTasks > 0 ? Math.round(completedTasks / totalTasks * 100) : 0;
    const prefixMap = { programming: 'prog', art: 'art', design: 'design' };
    const prefix = prefixMap[category] || category;
    document.getElementById(`${prefix}-total`).textContent = totalSprints;
    document.getElementById(`${prefix}-completed`).textContent = completedSprints;
    document.getElementById(`${prefix}-tasks`).textContent = totalTasks;
    document.getElementById(`${prefix}-progress`).textContent = progress + '%';
  }

  function getPhaseLabel(phase) {
    const labels = {'done': '완료', '4': 'Phase 4', '5': 'Phase 5', '6': 'Phase 6', 'art-a': 'Phase A', 'art-b': 'Phase B', 'art-c': 'Phase C', 'gd-a': 'Phase 4기', 'gd-b': 'Phase 5기', 'gd-c': 'Phase 6기'};
    return labels[phase] || phase;
  }

  function getProgressColor(progress) {
    if (progress < 33) return '#ef4444';
    if (progress < 66) return '#eab308';
    return '#22c55e';
  }

  function attachEventListeners() {
    document.querySelectorAll('.category-tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.category-content').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        const category = e.target.dataset.category;
        document.querySelector(`[data-category="${category}"].category-content`).classList.add('active');
      });
    });

    document.querySelectorAll('.phase-tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        const tabs = e.target.parentElement.querySelectorAll('.phase-tab');
        tabs.forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        render();
      });
    });

    document.querySelectorAll('.sprint-header').forEach(header => {
      header.addEventListener('click', () => {
        header.parentElement.classList.toggle('open');
      });
    });

    document.querySelectorAll('.task-check').forEach(check => {
      check.addEventListener('click', () => {
        const sprintId = check.dataset.sprintId;
        const taskId = check.dataset.taskId;
        const category = check.dataset.category;
        toggleTask(category, sprintId, taskId);
      });
    });

    document.querySelectorAll('.task-name, .task-desc').forEach(field => {
      field.addEventListener('blur', () => {
        const sprintId = field.dataset.sprintId;
        const taskId = field.dataset.taskId;
        const category = field.dataset.category;
        const newContent = field.textContent;
        updateTaskContent(category, sprintId, taskId, field.classList.contains('task-name') ? newContent : null, field.classList.contains('task-desc') ? newContent : null);
      });
    });

    document.querySelectorAll('.sprint-notes-content').forEach(notes => {
      notes.addEventListener('blur', () => {
        const sprintId = notes.dataset.sprintId;
        const category = notes.dataset.category;
        updateSprintNotes(category, sprintId, notes.textContent);
      });
    });

    document.querySelectorAll('.add-task-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentAddingTaskSprintId = btn.dataset.sprintId;
        currentAddingSprintCategory = btn.dataset.category;
        document.getElementById('addTaskModal').classList.add('active');
      });
    });

    document.querySelectorAll('.add-sprint-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentAddingSprintCategory = btn.dataset.category;
        document.getElementById('addSprintModal').classList.add('active');
      });
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const data = localStorage.getItem(STORAGE_KEY);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'freeflow-roadmap.json';
      a.click();
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFileInput').click();
    });

    document.getElementById('importFileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            render();
          } catch (err) {
            alert('JSON 파일 형식이 올바르지 않습니다.');
          }
        };
        reader.readAsText(file);
      }
    });
  }

  function toggleTask(category, sprintId, taskId) {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || initialData;
    const sprints = data[category];
    const sprint = sprints.find(s => s.id === sprintId);
    const task = sprint.tasks.find(t => t.id === taskId);
    task.done = !task.done;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    render();
  }

  function updateTaskContent(category, sprintId, taskId, newName, newDesc) {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || initialData;
    const sprints = data[category];
    const sprint = sprints.find(s => s.id === sprintId);
    const task = sprint.tasks.find(t => t.id === taskId);
    if (newName !== null) task.name = newName;
    if (newDesc !== null) task.desc = newDesc;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function updateSprintNotes(category, sprintId, notes) {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || initialData;
    const sprints = data[category];
    const sprint = sprints.find(s => s.id === sprintId);
    sprint.notes = notes;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function closeAddTaskModal() {
    document.getElementById('addTaskModal').classList.remove('active');
    document.getElementById('taskNameInput').value = '';
    document.getElementById('taskDescInput').value = '';
  }

  function saveNewTask() {
    const name = document.getElementById('taskNameInput').value;
    if (!name.trim()) {
      alert('작업 이름을 입력하세요.');
      return;
    }
    const desc = document.getElementById('taskDescInput').value;
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || initialData;
    const sprints = data[currentAddingSprintCategory];
    const sprint = sprints.find(s => s.id === currentAddingTaskSprintId);
    const newTask = {id: Date.now().toString(), name: name, desc: desc, done: false};
    sprint.tasks.push(newTask);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    render();
    closeAddTaskModal();
  }

  function closeAddSprintModal() {
    document.getElementById('addSprintModal').classList.remove('active');
    document.getElementById('sprintWeekInput').value = '';
    document.getElementById('sprintTitleInput').value = '';
    document.getElementById('sprintPhaseSelect').value = '4';
  }

  function saveNewSprint() {
    const week = document.getElementById('sprintWeekInput').value;
    const title = document.getElementById('sprintTitleInput').value;
    const phase = document.getElementById('sprintPhaseSelect').value;
    if (!week.trim() || !title.trim()) {
      alert('주차와 제목을 입력하세요.');
      return;
    }
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || initialData;
    const sprints = data[currentAddingSprintCategory];
    const newSprint = {id: `${currentAddingSprintCategory}-${Date.now()}`, week: week, title: title, phase: phase, tasks: [], notes: ''};
    sprints.push(newSprint);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    render();
    closeAddSprintModal();
  }

  document.getElementById('addTaskModal').addEventListener('click', (e) => {
    if (e.target.id === 'addTaskModal') closeAddTaskModal();
  });

  document.getElementById('addSprintModal').addEventListener('click', (e) => {
    if (e.target.id === 'addSprintModal') closeAddSprintModal();
  });

  init();
</script>
